<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <!-- Import Supabase JS SDK via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>Daftar Akun Baru</h2>
  <form id="registerForm">
    <label>Nama Lengkap:</label><br>
    <input type="text" id="fullName" required><br><br>

    <label>Username:</label><br>
    <input type="text" id="username" required><br><br>

    <label>Email:</label><br>
    <input type="email" id="email" required><br><br>

    <label>Password:</label><br>
    <input type="password" id="password" required><br><br>

    <label>Kapan terakhir kali merokok?</label><br>
    <input type="datetime-local" id="lastSmoke" required><br><br>

    <button type="submit">Daftar</button>
    <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
  </form>

  <script>
    // Konfigurasi Supabase
    const supabaseUrl = 'SUPABASE_URL';
    const supabaseKey = 'SUPABASE_PUBLISHABLE_KEY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault(); // Mencegah form reload

      const fullName = document.getElementById('fullName').value;
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const lastSmokeInput = document.getElementById('lastSmoke').value;

      // Konversi format tanggal ke standar ISO 8601 (mendukung zona waktu)
      const lastSmokeISO = new Date(lastSmokeInput).toISOString();

      // Eksekusi fungsi signUp dengan metadata
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: fullName,
            username: username,
            last_smoke: lastSmokeISO
          }
        }
      });

      if (error) {
        alert('Gagal mendaftar: ' + error.message);
      } else {
        alert('Registrasi berhasil! Silakan periksa email Anda untuk verifikasi.');
        window.location.href = 'login.html'; // Arahkan ke halaman login
      }
    });
  </script>
</body>
</html>
